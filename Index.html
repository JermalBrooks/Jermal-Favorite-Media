<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Using the audio element & video elements</title>
    <link rel="stylesheet" href="main.css" />
    <style>
      /*
      audio {
           width: 100%;
      }
      */
    </style>
  </head>

  <body>
    <h1>Welcome to the Jermals Favorite Media</h1>
    <audio controls src="media/sjv_welcome.mp3" preload="auto"></audio>
    <audio controls>
      <source src="audio.mp3" type="audio/mpeg" />
      Your browser does not support the audio element.
    </audio>
    <audio controls loop>
      <source src="audio.mp3" type="audio/mpeg" />
    </audio>
    <h1>Welcome to random videos</h1>

    <h1>Normal Rock Video</h1>
    <iframe
      width="560"
      height="315"
      src="https://www.youtube.com/embed/dQw4w9WgXcQ?si=NtgkuM1xOtYMKver"
      title="YouTube video player"
      frameborder="0"
      allow="
        accelerometer;
        autoplay;
        clipboard-write;
        encrypted-media;
        gyroscope;
        picture-in-picture;
        web-share;
      "
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
    ></iframe>
  </body>
</html>
